<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --bg-alt: #f2ede4;
  --bg-dark: #1a56a0;
  --text: #1c1714;
  --text-muted: #5a5248;
  --accent: oklch(60% 0.19 42);
  --accent-hover: oklch(55% 0.19 42);
  --teal: oklch(56% 0.09 185);
  --serif: 'DM Serif Display', Georgia, serif;
  --sans: 'DM Sans', sans-serif;
  --radius: 12px;
  --max: 760px;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  font-size: 19px;
  line-height: 1.75;
  overflow-x: hidden;
}

/* REVEAL ANIMATIONS */
.reveal {
  opacity: 0;
  transform: translateY(28px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}
.reveal.visible {
  opacity: 1;
  transform: translateY(0);
}
.reveal-delay-1 { transition-delay: 0.1s; }
.reveal-delay-2 { transition-delay: 0.2s; }
.reveal-delay-3 { transition-delay: 0.3s; }
.reveal-delay-4 { transition-delay: 0.4s; }
.reveal-delay-5 { transition-delay: 0.5s; }

/* ANNOUNCEMENT BAR */
.announcement-bar {
  background: #111;
  color: #e8f0fb;
  padding: 9px 0;
  font-size: 13px;
  font-weight: 500;
  overflow: hidden;
  white-space: nowrap;
}
.announcement-track {
  display: inline-flex;
  gap: 0;
  animation: ticker 18s linear infinite;
}
.announcement-track:hover { animation-play-state: paused; }
.announcement-item {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 0 32px;
}
.announcement-item a { color: #e85d24; text-decoration: none; font-weight: 600; }
.announcement-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  display: inline-block;
}
@keyframes ticker {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
@media (max-width: 480px) {
  .announcement-bar { font-size: 12px; padding: 8px 0; }
}

/* NAV */
.nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(28,23,20,0.08);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.nav-logo {
  font-family: var(--serif);
  font-size: 20px;
  letter-spacing: -0.3px;
  color: var(--text);
}
.nav-logo span { color: var(--accent); }
.nav-cta {
  background: var(--accent);
  color: #fff;
  padding: 10px 22px;
  border-radius: 50px;
  text-decoration: none;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.2px;
  transition: background 0.2s, transform 0.15s;
}
.nav-cta:hover { background: var(--accent-hover); transform: translateY(-1px); }

/* HERO */
.hero {
  min-height: 88vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px 60px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -120px; right: -120px;
  width: 600px; height: 600px;
  background: radial-gradient(circle, #e8f0fb 0%, transparent 70%);
  pointer-events: none;
}
.hero-eyebrow {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: #2563b8;
  margin-bottom: 24px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.hero-eyebrow::before, .hero-eyebrow::after {
  content: '';
  width: 28px;
  height: 1px;
  background: #2563b8;
  display: inline-block;
}
.hero h1 {
  font-family: var(--serif);
  font-size: clamp(34px, 5.5vw, 72px);
  line-height: 1.1;
  letter-spacing: -1.5px;
  max-width: 780px;
  margin-bottom: 28px;
}
.hero h1 em {
  font-style: italic;
  color: #133e7a;
}
.hero-sub {
  font-size: 20px;
  color: var(--text-muted);
  max-width: 500px;
  margin: 0 auto 40px;
  font-weight: 400;
  line-height: 1.6;
}
.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--accent);
  color: #fff;
  padding: 20px 40px;
  border-radius: 50px;
  font-size: 17px;
  font-weight: 600;
  text-decoration: none;
  letter-spacing: 0.3px;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 4px 20px oklch(60% 0.19 42 / 0.35);
}
.btn-primary:hover {
  background: var(--accent-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 28px oklch(60% 0.19 42 / 0.4);
}
.btn-primary svg { flex-shrink: 0; }
.hero-trust {
  margin-top: 28px;
  font-size: 13px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}
.trust-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--text-muted);
  opacity: 0.4;
}
.hero-img-wrap {
  width: 100%;
  max-width: 720px;
  margin: 56px auto 0;
  border-radius: 20px;
  overflow: hidden;
  position: relative;
}
.hero-img-placeholder {
  width: 100%;
  aspect-ratio: 16/9;
  background: repeating-linear-gradient(
    45deg,
    #e8e2d8 0px, #e8e2d8 1px,
    #ede8e0 1px, #ede8e0 12px
  );
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  color: #9e9088;
  font-family: monospace;
  font-size: 13px;
}

/* PAIN SECTION */
.pain-section {
  background: var(--bg-dark);
  color: #f5f1ea;
  padding: 100px 24px;
}
.section-inner { max-width: var(--max); margin: 0 auto; }
.section-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #2563b8;
  margin-bottom: 20px;
}
.pain-section .section-label {
  color: #e8f0fb;
}
.pain-section h2 {
  font-family: var(--serif);
  font-size: clamp(30px, 4.5vw, 48px);
  line-height: 1.15;
  letter-spacing: -0.8px;
  margin-bottom: 48px;
  max-width: 520px;
}
.pain-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.pain-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius);
  padding: 28px;
  transition: background 0.2s;
}
.pain-card:hover { background: rgba(255,255,255,0.08); }
.pain-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  background: oklch(60% 0.19 42 / 0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
}
.pain-card h3 {
  font-family: var(--serif);
  font-size: 18px;
  margin-bottom: 8px;
  font-weight: 400;
}
.pain-card p { font-size: 16px; color: rgba(245,241,234,0.75); line-height: 1.65; }

/* SOLUTION */
.solution-section {
  padding: 100px 24px;
  background: var(--bg);
}
.solution-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 64px;
  align-items: center;
}
.solution-visual {
  border-radius: 20px;
  overflow: hidden;
}
.solution-placeholder {
  aspect-ratio: 4/5;
  background: repeating-linear-gradient(
    -45deg,
    #e4ede9 0px, #e4ede9 1px,
    #edf4f1 1px, #edf4f1 12px
  );
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 10px;
  color: #7a9e92;
  font-family: monospace;
  font-size: 12px;
}
.solution-text h2 {
  font-family: var(--serif);
  font-size: clamp(28px, 3.5vw, 42px);
  line-height: 1.18;
  letter-spacing: -0.6px;
  margin-bottom: 20px;
}
.solution-text h2 em { font-style: italic; color: #2563b8; }
.solution-text p { color: var(--text-muted); margin-bottom: 24px; font-size: 18px; }
.stat-row {
  display: flex;
  gap: 32px;
  margin-top: 32px;
  padding-top: 32px;
  border-top: 1px solid rgba(28,23,20,0.1);
}
.stat-item {}
.stat-num {
  font-family: var(--serif);
  font-size: 34px;
  color: #2563b8;
  line-height: 1;
  margin-bottom: 4px;
}
.stat-label { font-size: 13px; color: var(--text-muted); }

/* HOW IT WORKS */
.how-section {
  background: var(--bg-alt);
  padding: 100px 24px;
}
.how-section h2 {
  font-family: var(--serif);
  font-size: clamp(28px, 4vw, 44px);
  letter-spacing: -0.6px;
  margin-bottom: 56px;
  text-align: center;
}
.steps-container {
  max-width: var(--max);
  margin: 0 auto;
}
.step-item {
  display: grid;
  grid-template-columns: 60px 1fr;
  gap: 24px;
  padding: 32px 0;
  border-bottom: 1px solid rgba(28,23,20,0.08);
  cursor: pointer;
  transition: opacity 0.2s;
}
.step-item:last-child { border-bottom: none; }
.step-num {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: rgba(28,23,20,0.06);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--serif);
  font-size: 20px;
  color: var(--text-muted);
  transition: background 0.3s, color 0.3s;
  flex-shrink: 0;
}
.step-item.active .step-num {
  background: #2563b8;
  color: #fff;
}
.step-content h3 {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 400;
  margin-bottom: 0;
  padding-top: 12px;
  transition: color 0.2s;
}
.step-item.active .step-content h3 { color: #2563b8; }
.step-desc {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease, opacity 0.3s;
  opacity: 0;
  font-size: 17px;
  color: var(--text-muted);
}
.step-item.active .step-desc {
  max-height: 120px;
  opacity: 1;
  margin-top: 12px;
}

/* TESTIMONIALS */
.testimonials-section {
  padding: 100px 24px;
  background: var(--bg);
}
.testimonials-section h2 {
  font-family: var(--serif);
  font-size: clamp(26px, 3.5vw, 40px);
  letter-spacing: -0.5px;
  margin-bottom: 48px;
  text-align: center;
}
.testimonials-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  max-width: var(--max);
  margin: 0 auto;
}
.testimonial-card {
  background: var(--bg-alt);
  border-radius: var(--radius);
  padding: 32px;
  position: relative;
}
.testimonial-card::before {
  content: '"';
  font-family: var(--serif);
  font-size: 80px;
  color: #2563b8;
  opacity: 0.2;
  position: absolute;
  top: 16px; left: 24px;
  line-height: 1;
}
.testimonial-text {
  font-size: 18px;
  line-height: 1.65;
  margin-bottom: 20px;
  color: var(--text);
}
.testimonial-author {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 500;
}
.stars {
  color: #2563b8;
  font-size: 14px;
  letter-spacing: 2px;
  margin-bottom: 12px;
}
.testimonial-card.featured {
  background: var(--bg-dark);
  color: #f5f1ea;
  grid-column: 1 / -1;
}
.testimonial-card.featured .testimonial-text { color: #f5f1ea; font-size: 18px; }
.testimonial-card.featured .testimonial-author { color: rgba(245,241,234,0.55); }

/* OFFER */
.offer-section {
  background: var(--bg-alt);
  padding: 100px 24px;
}
.offer-box {
  max-width: 580px;
  margin: 0 auto;
  text-align: center;
}
.offer-tag {
  display: inline-block;
  background: #dbeafe;
  color: #2563b8;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 6px 16px;
  border-radius: 50px;
  margin-bottom: 24px;
  border: none;
}
.offer-box h2 {
  font-family: var(--serif);
  font-size: clamp(26px, 4vw, 38px);
  margin-bottom: 36px;
  letter-spacing: -0.4px;
  line-height: 1.2;
  color: var(--text);
}
.offer-price-block {
  background: #111;
  border: none;
  border-radius: 20px;
  padding: 36px 32px;
  margin-bottom: 28px;
}
.price-row {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 12px;
  margin-bottom: 4px;
}
.price-old {
  font-size: 20px;
  font-size: 22px;
  color: rgba(255,255,255,0.35);
  text-decoration: line-through;
}
.price-new {
  font-family: var(--serif);
  font-size: clamp(52px, 10vw, 76px);
  line-height: 1;
  color: #fff;
  letter-spacing: -2px;
}
.price-installment {
  font-size: 19px;
  color: rgba(255,255,255,0.65);
  margin: 10px 0 0;
}
.price-installment strong { color: #fff; }
.offer-divider {
  width: 40px; height: 1px;
  background: rgba(255,255,255,0.15);
  margin: 24px auto;
}
.offer-perks {
  list-style: none;
  text-align: left;
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-bottom: 28px;
}
.offer-perks li {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 17px;
  color: rgba(255,255,255,0.9);
}
.perk-check {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: #22c55e;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: #fff;
}
.offer-urgency {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.urgency-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #4ade80;
  flex-shrink: 0;
  animation: pulse-dot 1.8s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}
.guarantee {
  margin-top: 16px;
  font-size: 13px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.offer-trust-row {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-top: 28px;
  flex-wrap: wrap;
}
.offer-trust-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-muted);
}

/* FAQ */
.faq-section {
  padding: 100px 24px;
  background: var(--bg);
}
.faq-section h2 {
  font-family: var(--serif);
  font-size: clamp(26px, 3.5vw, 40px);
  letter-spacing: -0.5px;
  margin-bottom: 48px;
  text-align: center;
}
.faq-list { max-width: var(--max); margin: 0 auto; }
.faq-item {
  border-bottom: 1px solid rgba(28,23,20,0.1);
}
.faq-question {
  width: 100%;
  background: none;
  border: none;
  text-align: left;
  padding: 24px 0;
  font-family: var(--sans);
  font-size: 19px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  transition: color 0.2s;
}
.faq-question:hover { color: #2563b8; }
.faq-question.open { color: #2563b8; }
.faq-chevron {
  flex-shrink: 0;
  width: 20px; height: 20px;
  transition: transform 0.3s;
  color: var(--text-muted);
}
.faq-question.open .faq-chevron { transform: rotate(180deg); }
.faq-answer {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}
.faq-answer.open { max-height: 200px; }
.faq-answer p {
  padding-bottom: 24px;
  color: var(--text-muted);
  font-size: 17px;
  line-height: 1.65;
}

/* FINAL CTA */
.final-cta {
  background: var(--bg-dark);
  padding: 120px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.final-cta::before {
  content: '';
  position: absolute;
  bottom: -200px; left: 50%;
  transform: translateX(-50%);
  width: 700px; height: 400px;
  background: radial-gradient(circle, oklch(60% 0.19 42 / 0.15) 0%, transparent 70%);
  pointer-events: none;
}
.final-cta h2 {
  font-family: var(--serif);
  font-size: clamp(32px, 5vw, 58px);
  letter-spacing: -1px;
  color: #f5f1ea;
  margin-bottom: 16px;
  line-height: 1.1;
}
.final-cta h2 em { font-style: italic; color: #fafaf7; }
.final-cta p {
  color: rgba(245,241,234,0.55);
  max-width: 420px;
  margin: 0 auto 40px;
  font-size: 16px;
}

/* TRUST BADGES */
.trust-badges {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px;
  margin-top: 28px;
}
.trust-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #fff;
  border: 1px solid #dbeafe;
  border-radius: 50px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 500;
  color: #1a56a0;
  box-shadow: 0 1px 4px rgba(28,23,20,0.06);
}
.trust-badge svg { flex-shrink: 0; }

function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.12 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

  { q: 'E se eu não ficar satisfeito?', a: 'Você tem 30 dias para testar. Se não estiver satisfeito por qualquer motivo, devolvemos 100% do valor pago, sem perguntas.' },
];

function FAQSection() {
  const [open, setOpen] = useState(null);
  return (
    <section className="faq-section">
      <div className="section-inner">
        <p className="section-label reveal" style={{textAlign:'center'}}>Dúvidas frequentes</p>
        <h2 className="reveal reveal-delay-1">Perguntas e respostas</h2>
        <div className="faq-list">
          {faqs.map((f, i) => (
            <div key={i} className={`faq-item reveal reveal-delay-${i}`}>
              <button
                className={`faq-question${open === i ? ' open' : ''}`}
                onClick={() => setOpen(open === i ? null : i)}
              >
                {f.q}
                <ChevronDown className="faq-chevron" />
              </button>
              <div className={`faq-answer${open === i ? ' open' : ''}`}>
                <p>{f.a}</p>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

// ── Final CTA ─────────────────────────────────────────────
function FinalCTA({ ctaText }) {
  return (
    <section className="final-cta">
      <h2 className="reveal">Sua recuperação<br/><em>começa hoje</em></h2>
      <p className="reveal reveal-delay-1">Não espere mais para recuperar sua independência e qualidade de vida.</p>
      <div className="reveal reveal-delay-2">
        <a href="#oferta" className="btn-primary">
          QUERO COMEÇAR AGORA <ArrowRight />
        </a>
      </div>
    </section>
  );
}

// ── Footer ────────────────────────────────────────────────
function Footer() {
  return (
    <footer className="footer">
      © 2026 Neuro+Rec®. Todos os direitos reservados. · Este produto não substitui orientação médica ou fisioterapêutica.
    </footer>
  );
}

// ── App ───────────────────────────────────────────────────
function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  useReveal();

  useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty('--accent', t.accentColor);
    root.style.setProperty('--accent-hover', t.accentColor + 'cc');
  }, [t.accentColor]);

  return (
    <>
      <AnnouncementBar />
      <Nav ctaText={t.ctaText} />
      <Hero tweaks={t} />
      <PainSection />
      <SolutionSection />
      <ForWhomSection />
      <HowSection />
      <TestimonialsSection />
      <OfferSection ctaText={t.ctaText} />
      <FAQSection />
      <FinalCTA ctaText={t.ctaText} />
      <Footer />
      <TweaksPanel>
        <TweakSection label="Marca" />
        <TweakColor label="Cor de destaque" value={t.accentColor} onChange={v => setTweak('accentColor', v)} />
        <TweakSection label="Hero" />
        <TweakSlider label="Tamanho do título" value={t.headlineSize} min={44} max={90} step={2} unit="px" onChange={v => setTweak('headlineSize', v)} />
        <TweakToggle label="Mostrar prova social" value={t.showSocialProof} onChange={v => setTweak('showSocialProof', v)} />
        <TweakSection label="Copywriting" />
        <TweakText label="Texto do CTA" value={t.ctaText} onChange={v => setTweak('ctaText', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
